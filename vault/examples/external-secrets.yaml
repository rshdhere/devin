# External Secrets Operator — sync Vault KV → Kubernetes Secret.
# Install ESO in your GitOps repo, then apply this manifest.
#
# Prerequisites:
#   - Vault running with Kubernetes auth (vault/bootstrap/kubernetes.sh)
#   - Secrets stored at secret/prod/server in Vault
#   - ClusterSecretStore pointing at Vault

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devin-server
  namespace: devin-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: devin-server
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/server
---
