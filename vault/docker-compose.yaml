# Local HashiCorp Vault for development.
# Start: docker compose -f vault/docker-compose.yaml up -d
# Bootstrap: ./vault/bootstrap/local.sh

name: devin-vault

services:
  vault:
    image: hashicorp/vault:1.17
    container_name: devin-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev -dev-root-token-id=dev-root-token
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - vault_data:/vault/data
      - ./config:/vault/config:ro

volumes:
  vault_data:
