name: Registry

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            image: devin-web
            dockerfile: docker/web/Dockerfile
          - app: server
            image: devin-server
            dockerfile: docker/server/Dockerfile
          - app: orchestrator
            image: devin-orchestrator
            dockerfile: docker/orchestrator/Dockerfile
          - app: scheduler
            image: devin-scheduler
            dockerfile: docker/scheduler/Dockerfile
          - app: firecracker-host
            image: devin-firecracker-host
            dockerfile: docker/firecracker-host/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long
            type=ref,event=tag

      - name: Build and push web
        if: matrix.app == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEB_APP_URL=${{ vars.NEXT_PUBLIC_WEB_APP_URL }}

      - name: Build and push
        if: matrix.app != 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  bump-gitops:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target overlay and image tag
        id: target
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ENVIRONMENT="production"
            OVERLAY="production/devin/overlays/external/kustomization.yaml"
          else
            ENVIRONMENT="staging"
            OVERLAY="staging/devin/overlays/external/kustomization.yaml"
          fi
          {
            echo "sha=${GITHUB_SHA}"
            echo "environment=${ENVIRONMENT}"
            echo "overlay=${OVERLAY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout ops (GitOps) repo
        uses: actions/checkout@v4
        with:
          repository: rshdhere/ops
          token: ${{ secrets.OPS_REPO_TOKEN }}
          path: ops

      - name: Bump image SHA
        working-directory: ops
        run: |
          set -euo pipefail
          OVERLAY="${{ steps.target.outputs.overlay }}"
          SHA="${{ steps.target.outputs.sha }}"
          # devin-orchestrator, devin-server, devin-web all carry `newTag:` in this overlay.
          sed -i -E "s|^([[:space:]]*newTag:).*|\1 ${SHA}|" "${OVERLAY}"
          echo "Updated ${OVERLAY}:"
          git --no-pager diff -- "${OVERLAY}"

      - name: Commit and push as actions-user
        working-directory: ops
        run: |
          set -euo pipefail
          OVERLAY="${{ steps.target.outputs.overlay }}"
          if git diff --quiet -- "${OVERLAY}"; then
            echo "No image changes — nothing to commit."
            exit 0
          fi
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add "${OVERLAY}"
          git commit -m "chore(devin): update orchestrator, server and web images to ${{ steps.target.outputs.sha }}"
          git push
