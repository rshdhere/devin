name: build-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build scheduler image
        run: docker build -f docker/scheduler/Dockerfile -t devin-scheduler:ci .

      - name: Build brain image
        run: docker build -f docker/brain/Dockerfile -t devin-brain:ci .

      - name: Build firecracker image
        run: docker build -f docker/firecracker/Dockerfile -t devin-firecracker:ci .

  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            apps/orchestrator/go.sum
            apps/firecracker/go.sum
            apps/runtime/go.sum
            packages/orchestrator/go.sum
            packages/sandbox/go.sum

      - name: Build orchestrator
        working-directory: apps/orchestrator
        run: go build ./cmd/orchestrator

      - name: Build firecracker
        working-directory: apps/firecracker
        run: go build ./cmd/firecracker

      - name: Build runtime supervisor
        working-directory: apps/runtime
        run: go build ./cmd/runtime

      - name: Test orchestrator packages
        working-directory: packages/orchestrator
        run: go test ./...

      - name: Vet sandbox API
        working-directory: packages/sandbox
        run: go vet ./...
