name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            apps/orchestrator/go.sum
            apps/firecracker-host/go.sum
            packages/orchestrator/go.sum
            packages/sandbox/go.sum

      - name: Build orchestrator
        working-directory: apps/orchestrator
        run: go build ./cmd/orchestrator

      - name: Build firecracker-host
        working-directory: apps/firecracker-host
        run: go build ./cmd/host

      - name: Test orchestrator packages
        working-directory: packages/orchestrator
        run: go test ./...

      - name: Vet sandbox API
        working-directory: packages/sandbox
        run: go vet ./...
