name: devin-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  server:
    image: ${DOCKERHUB_USERNAME:-rshdhere}/devin-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SCHEDULER_URL: http://brain:9092
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      brain:
        condition: service_started
    networks:
      - internal

  brain:
    image: ${DOCKERHUB_USERNAME:-rshdhere}/devin-brain:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/brain/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EXECUTION_WORKER_URL: ${EXECUTION_WORKER_URL:-http://host.docker.internal:9091}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL:-http://host.docker.internal:9090}
      DEFAULT_AGENT: cursor
      BRAIN_PORT: "9092"
      SERVICE_MODE: brain
    ports:
      - "${BRAIN_PORT:-9092}:9092"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  web:
    image: ${DOCKERHUB_USERNAME:-rshdhere}/devin-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WEB_APP_URL: ${NEXT_PUBLIC_WEB_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - server
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
