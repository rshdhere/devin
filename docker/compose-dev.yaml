name: devin-dev

x-dev-volumes: &dev-volumes
  - ..:/app
  - dev_node_modules:/app/node_modules

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devin"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
      target: base
    volumes: *dev-volumes
    ports:
      - "8080:8080"
    env_file:
      - ../apps/server/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/devin
      BETTER_AUTH_URL: http://localhost:8080
      WEB_APP_URL: http://localhost:3000
      PORT: "8080"
    command: sh -c "bun install --frozen-lockfile && bun run --cwd apps/server dev"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      target: base
    volumes: *dev-volumes
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WEB_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    command: sh -c "bun install --frozen-lockfile && bun run --cwd apps/web dev -- --hostname 0.0.0.0"
    depends_on:
      - server

volumes:
  postgres_data:
  dev_node_modules:
